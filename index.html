<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Book of Answers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Book of Answers</h1>

    <p class="instruction">
      Think of a question. Hold it in your mind.
    </p>

    <input id="numberInput" type="number" placeholder="Enter a number (1–100)">

    <button id="submitBtn">Reveal Answer</button>

    <div id="answer" class="hidden"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
