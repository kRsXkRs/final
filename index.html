<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cyber Book of Answers</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main id="aboutPage" class="page show">
    <h1>Book of Answers</h1>
    <p>
      Think of a question, but do not type it.
      \nThe book only needs a number.
    </p>
    <p class="small">
      Enter the ritual when you are ready.
    </p>
    <button id="enterBtn">Enter</button>
  </main>

  <main id="oraclePage" class="page">
    <h1>Ask Silently</h1>
    <p class="instruction">
      Hold your question in your mind.
    </p>

    <input 
      id="numberInput" 
      type="number" 
      placeholder="Enter a number (1–100)" 
      min="1" 
      max="100"
    />

    <button id="submitBtn">Reveal Answer</button>
  </main>

  <main id="answerPage" class="page answer-page">
    <div id="answer"></div>
    <p id="returnHint">click anywhere to return</p>
  </main>

  <div id="overlay" class="overlay"></div>

  <script src="script.js"></script>
</body>
</html>
